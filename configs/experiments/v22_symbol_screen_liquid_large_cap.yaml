# pipeline artifacts exist for that symbol. Do not overwrite the AAPL config;
# it is the reproducible negative benchmark.
data_slices:
  - symbol: AAPL
    config: configs/data/aapl_wrds_20260313_20260410.yaml

screening:
  validation_min_dates: 2
  horizons:
    - 1s
    - 5s
    - 10s
    - 30s
    - 60s
  decile_horizons:
    - 1s
    - 5s
  pass_move_over_cost: 1.0
  strong_pass_move_over_cost: 1.5
  fail_move_over_cost: 0.5
