slice_name: aapl_wrds_latest_3_trading_days
purpose: historical_research_baseline
research_status: primary

source:
  provider: wrds
  dataset_family: taq
  quote_dataset: cqm
  trade_dataset: ctm
  asset_class: us_equities
  venue_scope: consolidated

universe:
  symbols:
    - AAPL

time_range:
  trading_dates:
    - 2026-04-24
    - 2026-04-27
    - 2026-04-28
  session: regular_market_hours
  market_open: "09:30:00"
  market_close: "16:00:00"
  timezone: America/New_York

data_contract:
  quote_level: level_1
  separate_tables: true
  shared_columns:
    - event_time
    - symbol
    - source
  quote_columns:
    - event_time
    - symbol
    - source
    - quote_exchange
    - bid_exchange
    - ask_exchange
    - quote_condition
    - quote_sequence_number
    - natbbo_indicator
    - bid
    - ask
    - bid_size
    - ask_size
  trade_columns:
    - event_time
    - symbol
    - source
    - trade_exchange
    - sale_condition
    - trade_correction
    - trade_id
    - trade_source
    - trade_sequence_number
    - trade_price
    - trade_size

  quote_mapping:
    event_time: date + time_m
    symbol: sym_root + sym_suffix
    quote_exchange: ex
    bid: bid
    ask: ask
    bid_size: bidsiz
    ask_size: asksiz
    bid_exchange: bidex
    ask_exchange: askex
    quote_condition: qu_cond
    quote_sequence_number: qu_seqnum
    natbbo_indicator: natbbo_ind
    source: wrds_taq_cqm

  trade_mapping:
    event_time: date + time_m
    symbol: sym_root + sym_suffix
    trade_price: price
    trade_size: size
    trade_exchange: ex
    sale_condition: tr_scond
    trade_correction: tr_corr
    trade_id: tr_id
    trade_source: tr_source
    trade_sequence_number: tr_seqnum
    source: wrds_taq_ctm

storage:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
