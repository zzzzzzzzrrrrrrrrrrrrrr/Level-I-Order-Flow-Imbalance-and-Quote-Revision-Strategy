data_contract:
  quote_level: level_1
  quote_scope: national_bbo
  quote_source: wrds_taq_nbbom
  trade_source: wrds_taq_ctm
  separate_tables: true
  shared_columns:
    - event_time
    - symbol
    - source
  quote_columns:
    - event_time
    - symbol
    - source
    - bid_exchange
    - ask_exchange
    - nbbo_quote_condition
    - bid
    - ask
    - bid_size
    - ask_size
  trade_columns:
    - event_time
    - symbol
    - source
    - trade_exchange
    - sale_condition
    - trade_correction
    - trade_sequence_number
    - trade_price
    - trade_size

  quote_mapping:
    event_time:
      expr: combine_date_time
      date_col: date
      time_col: time_m
      timezone: America/New_York
    symbol:
      expr: concat_symbol
      root_col: sym_root
      suffix_col: sym_suffix
    empty_suffix_policy: omit
    bid_exchange: best_bidex
    ask_exchange: best_askex
    nbbo_quote_condition: nbbo_qu_cond
    bid: best_bid
    ask: best_ask
    bid_size: best_bidsiz
    ask_size: best_asksiz
    source:
      literal: wrds_taq_nbbom

  trade_mapping:
    event_time:
      expr: combine_date_time
      date_col: date
      time_col: time_m
      timezone: America/New_York
    symbol:
      expr: concat_symbol
      root_col: sym_root
      suffix_col: sym_suffix
      empty_suffix_policy: omit
    trade_price: price
    trade_size: size
    trade_exchange: ex
    sale_condition: tr_scond
    trade_correction: tr_corr
    trade_sequence_number: tr_seqnum
    source:
      literal: wrds_taq_ctm

storage:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
